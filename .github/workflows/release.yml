# ─── Release: Tag-based build & publish ────────────────────
# Triggers on tags matching v* (e.g. v0.1.0, v1.2.3-beta).
# Produces:
#   • Windows EXE   – built on windows-latest with MSVC toolchain
#   • Android APK   – built on ubuntu-latest with Android SDK
# Both artifacts are uploaded to a GitHub Release.
# ────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── Windows: build EXE with MSVC ─────────────────────────
  windows:
    name: Windows (EXE)
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSVC toolchain)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Build windows binary (release)
        run: cargo build --release -p usb-passthrough
        continue-on-error: true

      - name: Locate built EXE
        id: exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter "*.exe" -Path target/release/ | Select-Object -First 1
          if ($exe) {
            echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_OUTPUT
            echo "EXE_NAME=$($exe.Name)" >> $env:GITHUB_OUTPUT
          } else {
            echo "No EXE found — check build output"
            echo "EXE_PATH=" >> $env:GITHUB_OUTPUT
            echo "EXE_NAME=usbip-windows.exe" >> $env:GITHUB_OUTPUT
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: usbip-windows-x86_64
          path: ${{ steps.exe.outputs.EXE_PATH }}
          if-no-files-found: warn

  # ── Android: build APK ───────────────────────────────────
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon
        continue-on-error: true

      - name: Locate APK
        id: apk
        run: |
          APK=$(find . -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" | head -1)
          fi
          echo "APK_PATH=$APK" >> $GITHUB_OUTPUT
          echo "APK_NAME=$(basename $APK)" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: usbip-android-apk
          path: ${{ steps.apk.outputs.APK_PATH }}
          if-no-files-found: warn

  # ── Publish: create GitHub Release with all artifacts ────
  publish:
    name: Publish Release
    needs: [windows, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate release notes
        id: notes
        run: |
          echo "## USB/IP Passthrough Release ${{ github.ref_name }}" > _notes.md
          echo "" >> _notes.md
          echo "### Artifacts" >> _notes.md
          echo "- **Windows EXE** — x86_64 MSVC build" >> _notes.md
          echo "- **Android APK** — release build" >> _notes.md
          echo "" >> _notes.md
          echo "See CHANGELOG or ROADMAP.md for details." >> _notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: _notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          files: |
            artifacts/**/*
